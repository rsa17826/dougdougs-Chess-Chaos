<!DOCTYPE HTML>
<html>
<head>
    <title>Chess Chaos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');</style>
  <script type="module" crossorigin src="assets/index-readable.js"></script>
  <link rel="stylesheet" crossorigin href="assets/index-CJ5hlPYt.css">
</head>
<body>
    <div id="password-modal">
        <form id="password-form">
            <label id="password-label">Password</label>
            <input id="password-input" type="password" >
            <button id="password-button" type="submit">Enter</button>
            <label id="password-error">
        </form>
    </div>

    <div class="page">
        <header class="page-header">
            <div class="title-wrapper">
                <div id='title-card' class="title-card">
                    <div class="card-face card-front white-turn">White Turn</div>
                    <div class="card-face card-back black-turn">Black Turn</div>
                </div>
            </div>
        </header>

    <div class="ignore-turns-widget">
        <span class="ignore-turns-label">Ignore Turns</span>
        <input type="checkbox" id="ignore-turns-checkbox" class="ignore-turns-checkbox">
    </div>

        <section id="game-section" class="game-section">
            <div id="viewport" class="viewport">
                <div id="stage" class="stage">
                    <div id="chess-stage" class="chess-stage">
                        <div class="board-sprite" aria-hidden="true"></div>
                        <div id="board-effects-layer" class="board-effects-layer"></div>
                        <div id="pieces-layer" class="pieces-layer"></div>
                        <div id="highlight-layer" class="highlight-layer"></div>
                    </div>
                </div>
            </div>
            <div id="new-rules" class="new-rules hidden">
                <!-- Example format:
                <div class="new-rule-card">
                    <p class="new-rule-title">Pacifist</p>
                    <p class="new-rule-description">Pawns can attack left and right</p>
                    <p class="new-rule-duration">Turns Left: 2</p>
                </div> -->
            </div>
        </section>

        <section id="current-rules-section" class="current-rules-section">
            <!-- Example format:
            <div class="current-rule-card">
                <p class="current-rule-description">Pawns can attack left and right</p>
                <p class="current-rule-duration">Turns Left: 2</p>
            </div> -->
        </section>

        </section>

        <section id="tools-section" class="tools-section">
            <button id="undo-turn" type="button">Undo Turn</button>
            <h3 id="next-turn-with-new-rules">New Rules In ? Turns</h3>
            <h3 id="pusher-status">Disconnected</h3>
            <button id="reset-board" type="button">Reset Board</button>
        </section>

        <section id="randomizer-section" class="randomizer-section">
            <div class="section-heading">
                <h2>Randomizer</h2>
            </div>
            <div id="randomizer-panel" class="randomizer-panel"></div>
        </section>

        <section id="settings-section" class="settings-section">
            <div class="section-heading">
                <h2>Piece Settings</h2>
            </div>
            <div id="settings-panel" class="settings-panel"></div>
        </section>
    </div>
</body>
</html>
